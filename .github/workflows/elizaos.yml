name: ElizaOS Daily Data Collection

on:
  schedule:
    - cron: '0 0 * * *' # Run at midnight UTC every day
  workflow_dispatch:
    inputs:
      after_date:
        description: 'Start date (YYYY-MM-DD)'
        required: false
        type: string
      before_date:
        description: 'End date (YYYY-MM-DD)'
        required: false
        type: string
      force_overwrite:
        description: 'Force overwrite existing data'
        required: false
        type: boolean
        default: false

# Prevent race conditions when deploying to gh-pages
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  data-collection:
    uses: ./.github/workflows/data-collection.yml
    with:
      source_name: elizaos
      source_display_name: elizaos
      historical_output: ./output
      include_discord_summaries: true
      commit_message_prefix: "Update ElizaOS unified data"
      after_date: ${{ inputs.after_date || '' }}
      before_date: ${{ inputs.before_date || '' }}
      force_overwrite: ${{ inputs.force_overwrite || false }}
    secrets:
      ENV_SECRETS: ${{ secrets.ENV_SECRETS }}
      SQLITE_ENCRYPTION_KEY: ${{ secrets.SQLITE_ENCRYPTION_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
