name: Hyperfy Discord

on:
  schedule:
    - cron: '30 23 * * *' # Run at 11:30 PM UTC every day
  workflow_dispatch: # Allows manual triggering
    inputs:
      after_date:
        description: 'Start date (YYYY-MM-DD)'
        required: false
        type: string
      before_date:
        description: 'End date (YYYY-MM-DD)'
        required: false
        type: string
      force_overwrite:
        description: 'Force overwrite existing data'
        required: false
        type: boolean
        default: false

# Prevent race conditions when deploying to gh-pages
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  data-collection:
    uses: ./.github/workflows/data-collection.yml
    with:
      source_name: hyperfy-discord
      source_display_name: hyperfy
      historical_output: ./output/hyperfy
      include_discord_summaries: false
      commit_message_prefix: "Update Hyperfy data"
      after_date: ${{ inputs.after_date || '' }}
      before_date: ${{ inputs.before_date || '' }}
      force_overwrite: ${{ inputs.force_overwrite || false }}
    secrets:
      ENV_SECRETS: ${{ secrets.ENV_SECRETS }}
      SQLITE_ENCRYPTION_KEY: ${{ secrets.SQLITE_ENCRYPTION_KEY }}
