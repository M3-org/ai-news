name: Fetch and decrypt SQLite database
description: >
  Fetch data/<source_name>.sqlite.enc from the gh-pages branch (if it exists),
  decrypt it with openssl aes-256-cbc -pbkdf2, run PRAGMA integrity_check,
  and remove the encrypted file. Safe on first-run (no gh-pages branch) and
  on repos without an existing encrypted DB.

  The encryption key must be provided as the SQLITE_ENCRYPTION_KEY env var
  on the calling step, NOT as a composite input (inputs can appear in logs).

inputs:
  source_name:
    description: 'Source name (config file stem and DB file stem, e.g. elizaos or hyperfy-discord)'
    required: true
  required:
    description: >
      If 'true', fail when the DB is not present or cannot be decrypted.
      If 'false' (default), skip silently and continue with no DB.
    required: false
    default: 'false'

outputs:
  decrypted:
    description: "'true' if a plaintext DB file was produced, else 'false'"
    value: ${{ steps.decrypt.outputs.decrypted }}

runs:
  using: composite
  steps:
    - name: Fetch encrypted DB from gh-pages
      shell: bash
      env:
        SOURCE_NAME: ${{ inputs.source_name }}
        REQUIRED: ${{ inputs.required }}
      run: |
        set -euo pipefail
        mkdir -p data
        DB_ENC="data/${SOURCE_NAME}.sqlite.enc"

        echo "Checking if gh-pages branch exists on remote..."
        if ! git ls-remote --heads origin gh-pages | grep -q gh-pages; then
          echo "ℹ️  gh-pages branch does not exist yet - will be created on first deployment"
          exit 0
        fi

        echo "✅ gh-pages branch exists, attempting to fetch"
        if ! git fetch origin gh-pages:gh-pages --depth=1; then
          echo "::error::Failed to fetch gh-pages branch (network issue or access problem)"
          exit 1
        fi

        if ! git ls-tree -r --name-only gh-pages | grep -q "${DB_ENC}"; then
          echo "ℹ️  No existing encrypted database in gh-pages — starting fresh"
          if [ "${REQUIRED}" = "true" ]; then
            echo "::error::Encrypted database required but not found at ${DB_ENC}"
            exit 1
          fi
          exit 0
        fi

        echo "📦 Restoring encrypted database from gh-pages..."
        if ! git show "gh-pages:${DB_ENC}" > "${DB_ENC}"; then
          echo "::error::Failed to extract ${DB_ENC} from gh-pages"
          exit 1
        fi
        if [ ! -s "${DB_ENC}" ]; then
          echo "::error::Extracted ${DB_ENC} is empty"
          rm -f "${DB_ENC}"
          exit 1
        fi
        echo "✅ Restored ${DB_ENC} ($(wc -c < "${DB_ENC}") bytes)"

    - name: Decrypt and verify DB integrity
      id: decrypt
      shell: bash
      env:
        SOURCE_NAME: ${{ inputs.source_name }}
        REQUIRED: ${{ inputs.required }}
      run: |
        set -euo pipefail

        # Mask the encryption key defensively (GitHub already masks secrets, but repeating guards against env-echoing bugs)
        if [ -n "${SQLITE_ENCRYPTION_KEY:-}" ]; then
          echo "::add-mask::$SQLITE_ENCRYPTION_KEY"
        fi

        DB_ENC="data/${SOURCE_NAME}.sqlite.enc"
        DB_FILE="data/${SOURCE_NAME}.sqlite"

        if [ ! -f "${DB_ENC}" ]; then
          echo "ℹ️  No encrypted database to decrypt"
          echo "decrypted=false" >> "$GITHUB_OUTPUT"
          if [ "${REQUIRED}" = "true" ]; then
            echo "::error::Encrypted database required but not present"
            exit 1
          fi
          exit 0
        fi

        if [ -z "${SQLITE_ENCRYPTION_KEY:-}" ]; then
          echo "::error::SQLITE_ENCRYPTION_KEY env var is not set"
          rm -f "${DB_ENC}"
          exit 1
        fi

        echo "Decrypting ${DB_ENC}..."
        if ! openssl enc -d -aes-256-cbc -pbkdf2 -in "${DB_ENC}" -out "${DB_FILE}" -k "$SQLITE_ENCRYPTION_KEY"; then
          echo "::error::Decryption failed — check the encryption key or file integrity"
          rm -f "${DB_FILE}" "${DB_ENC}"
          exit 1
        fi
        echo "✅ Decryption successful"

        # Integrity check (sqlite3 is preinstalled on ubuntu-latest runners)
        if command -v sqlite3 >/dev/null 2>&1; then
          echo "Running PRAGMA integrity_check..."
          if ! sqlite3 "${DB_FILE}" "PRAGMA integrity_check;" | grep -q "^ok$"; then
            echo "::error::Database integrity check failed — decrypted file may be corrupted"
            rm -f "${DB_FILE}" "${DB_ENC}"
            exit 1
          fi
          echo "✅ Integrity check passed"
        else
          echo "⚠️  sqlite3 not available, skipping integrity check"
        fi

        rm -f "${DB_ENC}"
        echo "decrypted=true" >> "$GITHUB_OUTPUT"
